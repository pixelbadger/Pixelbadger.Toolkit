name: Build, Pack, and Publish to NuGet

on:
  push:
    branches: [ master ]
    paths:
      - 'Pixelbadger.Toolkit/**'
      - '!**/*.Tests/**'
      - '!.github/**'
      - '!Pixelbadger.Toolkit.Benchmarks/**'
      - '!docs/**'

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      main-code-changed: ${{ steps.changes.outputs.main-code }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: dorny/paths-filter@v3
      id: changes
      with:
        filters: |
          main-code:
            - 'Pixelbadger.Toolkit/**'
            - '!Pixelbadger.Toolkit.Tests/**'
            - '!Pixelbadger.Toolkit.Benchmarks/**'
            - '!docs/**'
            - '!.github/**'

  build-and-test:
    runs-on: ubuntu-latest
    needs: [check-changes]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
      continue-on-error: true  # Continue even if no tests exist

  publish-main:
    runs-on: ubuntu-latest
    needs: [check-changes, build-and-test]
    if: needs.check-changes.outputs.main-code-changed == 'true'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore Pixelbadger.Toolkit/Pixelbadger.Toolkit.csproj

    - name: Build
      run: dotnet build Pixelbadger.Toolkit/Pixelbadger.Toolkit.csproj --no-restore --configuration Release

    - name: Pack
      run: dotnet pack Pixelbadger.Toolkit/Pixelbadger.Toolkit.csproj --no-build --configuration Release --output ./artifacts

    - name: Publish to NuGet
      run: |
        dotnet nuget push ./artifacts/Pixelbadger.Toolkit.*.nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION=$(grep -oP '(?<=<Version>)[^<]+' Pixelbadger.Toolkit/Pixelbadger.Toolkit.csproj)
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "v${VERSION}" || echo "Tag v${VERSION} already exists"
        git push origin "v${VERSION}" || echo "Tag v${VERSION} already pushed"
        gh release create "v${VERSION}" \
          --title "Release v${VERSION}" \
          --generate-notes \
          --latest \
          || echo "Release v${VERSION} already exists"
